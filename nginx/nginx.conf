worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 3000;
        server_name localhost;

        location /app/whatsapp {
            proxy_pass http://localhost:3001/app/whatsapp;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        location / {
            # Esta directiva maneja otras posibles rutas que no sean /app/whatsapp
            # Por ejemplo, si tienes una API en la raíz.
            # Si no tienes otras rutas, puedes dejarlo como está.
            # Si tu aplicación solo funciona en /app/whatsapp, podría ser una buena idea
            # devolver un 404 o una página de error aquí.
            # Para tu caso, el proxy_pass al puerto 3001 ya está cubriendo la lógica.
            proxy_pass http://localhost:3001;
        }
    }
}
