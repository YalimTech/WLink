# nginx.conf

# Configuración general de Nginx.
# Define el número de procesos de trabajo y las conexiones por proceso.
worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Incluye los tipos MIME para que el navegador interprete correctamente los archivos.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Habilita la compresión Gzip para acelerar la carga de la página.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Define los servicios upstream (backend y frontend).
    # Nginx balanceará la carga o redirigirá las peticiones a estos servicios.
    upstream backend_service {
        # Apunta al servicio de NestJS que corre en el puerto 3000.
        server 127.0.0.1:3000;
    }

    upstream frontend_service {
        # Apunta al servicio de Next.js que corre en el puerto 3001.
        server 127.0.0.1:3001;
    }

    server {
        # Nginx escuchará en el puerto 80.
        listen 80;
        # Reemplaza 'localhost' con tu dominio si lo tienes.
        server_name localhost;

        # --- REGLAS DE ENRUTAMIENTO ---

        # 1. Redirige la ruta raíz ("/") a la aplicación en "/app/".
        # Si un usuario visita http://tu.dominio/, será enviado a http://tu.dominio/app/.
        location = / {
            return 301 /app/;
        }

        # 2. Envía todo el tráfico de la API, webhooks y OAuth al backend (NestJS).
        # Esto captura cualquier URL que empiece con /api/, /webhooks/ o /oauth/.
        location ~ ^/(api|webhooks|oauth)/ {
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cabeceras para habilitar el soporte de WebSockets (esencial para el QR).
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 3. Envía el tráfico de la aplicación al frontend (Next.js).
        # Esto es para manejar el `basePath: '/app'` de Next.js.
        location /app/ {
            proxy_pass http://frontend_service/app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Soporte de WebSockets también para el frontend (útil para el desarrollo con Next.js).
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 4. Redirige /app a /app/ para asegurar que la regla anterior funcione siempre.
        location = /app {
            return 301 /app/;
        }
    }
}
