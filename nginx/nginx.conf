worker_processes 1;

events { worker_connections 1024; }

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 3000;
    server_name localhost;

    # Normaliza sin-slash -> con-slash (evita 404 o loops)
    location = /app/whatsapp { return 301 /app/whatsapp/; }

    # App Next con basePath /app/whatsapp
    location ^~ /app/whatsapp/ {
      proxy_pass http://localhost:3002/app/whatsapp/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # Assets de Next cuando se pidan fuera del basePath (por seguridad)
    location ^~ /_next/ {
      proxy_pass http://localhost:3002/_next/;
      proxy_set_header Host $host;
    }

    # API u otras rutas -> NestJS
    location / {
      proxy_pass http://localhost:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # (Opcional) CSP para GHL si prefieres en NGINX
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.gohighlevel.com https://*.hl-platform.com" always;
  }
}
