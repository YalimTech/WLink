# nginx.conf

# Configuración global de Nginx
worker_processes auto;
events {
    worker_connections 1024;
}

# El bloque http DEBE envolver a los upstreams, gzip y al server
http {
    # Habilita la compresión Gzip para acelerar la carga de la página.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstreams van PRIMERO DENTRO del bloque http
    upstream backend_service {
        server 127.0.0.1:3000;
    }

    upstream frontend_service {
        server 127.0.0.1:3001;
    }

    # El bloque server va DESPUÉS de los upstreams, pero también DENTRO de http
    server {
        listen 80;
        server_name localhost;

        # --- REGLAS DE ENRUTAMIENTO ---

        # 1. Redirige la raíz a /app/
        location = / {
            return 301 /app/;
        }

        # 2. Peticiones para la API y OAuth van al backend.
        location ~ ^/(api|webhooks|oauth)/ {
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 3. Peticiones para la aplicación Next.js.
        location /app/ {
            rewrite ^/app(/.*)$ $1 break;
            proxy_pass http://frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 4. Redirige /app a /app/
        location = /app {
            return 301 /app/;
        }
    }
}

