# nginx.conf

# Configuración global de Nginx
worker_processes auto;
events {
    worker_connections 1024;
}

# El bloque http DEBE envolver a los upstreams, gzip y al server
http {
    # Habilita la compresión Gzip para acelerar la carga de la página.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstreams van PRIMERO DENTRO del bloque http
    upstream backend_service {
        server 127.0.0.1:3000;
    }

    upstream frontend_service {
        server 127.0.0.1:3001;
    }

    # Servidor HTTP - Redirige todo a HTTPS
    server {
        listen 80;
        server_name _;
        
        # Redirige todo el tráfico HTTP a HTTPS
        return 301 https://$host$request_uri;
    }

    # Servidor HTTPS principal
    server {
        listen 443 ssl http2;
        server_name _;

        # Configuración SSL básica (Railway/Bridge manejará los certificados)
        ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
        
        # Configuración SSL moderna
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;

        # --- REGLAS DE ENRUTAMIENTO OPTIMIZADAS ---

        # 1. Redirige la raíz a /app/ (una sola vez)
        location = / {
            return 301 /app/;
        }

        # 2. OAuth y API del backend - MUY ESPECÍFICO PRIMERO
        location ~ ^/(api|webhooks|oauth)/ {
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Configuración específica para evitar bucles de redirección
            proxy_buffering off;
            proxy_redirect off;
            proxy_read_timeout 86400;
        }

        # 3. Frontend Next.js - TODO bajo /app/
        location /app/ {
            # CORRECCIÓN: Reescribe la URL eliminando el prefijo /app
            # para que Next.js reciba la ruta correcta sin el basePath.
            rewrite ^/app(/.*)$ $1 break;
            proxy_pass http://frontend_service;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Configuración específica para Next.js
            proxy_buffering off;
            proxy_redirect off;
            proxy_read_timeout 86400;
        }

        # 4. Redirige /app sin slash a /app/ SOLO si no hay más path
        # 4. Redirección única de /app a /app/
        location = /app {
            return 301 /app/;
        }

        # 5. Cualquier otra ruta no manejada - redirigir a /app/
        location / {
            return 301 /app/;
        }
    }
}
    